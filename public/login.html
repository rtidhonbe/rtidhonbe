<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rti dhonbe</title>
  <meta property="og:title" content="Open source RTI tool">
  <meta property="og:description" content="Your one stop solution for anything RTI-related. Request, track, and archive.">
  <meta property="og:image" content="https://rtidhonbe.com/og-image.png">
  <meta property="og:url" content="https://rtidhonbe.com">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="RTI Dhonbe">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://rtidhonbe.com/og-image.png">
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="icon" href="/favicon.svg" sizes="any" type="image/svg+xml">
  <link rel="stylesheet" href="/login.css">
</head>
<body>
<div class="card">
  <div class="logo">rti dhonbe</div>
  <div class="sub" style="margin-bottom:4px;">sign in with your mahoali account</div>
  <div class="sub" style="margin-top:4px;">don't have one? <a href="https://icom.mv/portal/login" target="_blank" rel="noopener noreferrer" class="create-link" style="color:var(--green);text-decoration:none;">create one here ↗</a></div>
  <form id="login-form" action="/api/auth/login" method="post" autocomplete="on">
  <label style="margin-top:20px;">mahoali email</label>
  <input type="email" id="email" placeholder="you@example.com" autocomplete="username">
  <label>mahoali password</label>
  <input type="password" id="password" autocomplete="current-password">
  <label id="remember-label" style="display:flex; align-items:center; gap:8px; margin-bottom:14px; cursor:pointer; text-transform:none; letter-spacing:0; font-size:11px; font-weight:400;">
    <input type="checkbox" id="remember">
    keep me signed in
  </label>
  <button class="btn" id="btn" type="submit">SIGN IN</button>
  <div class="error" id="error"></div>
  </form>
  <div style="display:flex;align-items:center;gap:12px;margin-top:18px"><div style="flex:1;height:1px;background:var(--border2)"></div><span style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px">or</span><div style="flex:1;height:1px;background:var(--border2)"></div></div>
  <a href="/vault" class="btn-vault-browse" style="display:block;width:100%;padding:10px;border:1px solid #00994d;background:rgba(0,204,85,.08);color:#00cc55;border-radius:3px;font-size:12px;font-weight:700;font-family:inherit;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:all .15s;text-decoration:none;text-align:center;margin-top:12px;">BROWSE VAULT WITHOUT SIGNING IN</a>
  <div style="font-size:10px; color:var(--text-dim); margin-top:18px; line-height:1.5;">* rti dhonbe is not affiliated with, endorsed by, or associated with ICOM or the Maldives government.</div>
</div>
<script src="/login.js"></script>
</body>
</html>
