<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — rti dhonbe</title>
  <meta property="og:title" content="rti dhonbe">
  <meta property="og:description" content="free open source software for submitting, tracking, and archiving RTIs">
  <meta property="og:image" content="https://rtidhonbe.com/og-image.png">
  <meta property="og:url" content="https://rtidhonbe.com">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://rtidhonbe.com/og-image.png">
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="icon" href="/favicon.svg" sizes="any" type="image/svg+xml">
  <style>
    :root {
      --bg:         #080c08;
      --surface:    #0d120d;
      --border2:    #243a24;
      --green:      #00cc55;
      --green-glow: rgba(0,204,85,.35);
      --text-muted: #4a724a;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn .25s ease;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 40px 36px;
      max-width: 360px;
      width: 90%;
      text-align: center;
      box-shadow: 0 0 30px rgba(0,204,85,.07);
    }
    .code {
      font-size: 48px;
      font-weight: 700;
      color: var(--green);
      text-shadow: 0 0 20px var(--green-glow);
      letter-spacing: 4px;
      margin-bottom: 10px;
    }
    .label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 8px;
    }
    .sub {
      font-size: 10px;
      color: var(--text-muted);
      opacity: .6;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="code">404</div>
    <div class="label">page not found</div>
    <div class="sub">the url you entered does not exist</div>
  </div>
</body>
</html>
