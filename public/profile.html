<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="icon" href="/favicon.svg" sizes="any" type="image/svg+xml">
  <title>profiles — rti dhonbe</title>
  <meta property="og:title" content="Open source RTI tool">
  <meta property="og:description" content="Your one stop solution for anything RTI-related. Request, track, and archive.">
  <meta property="og:image" content="https://rtidhonbe.com/og-image.png">
  <meta property="og:url" content="https://rtidhonbe.com">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="RTI Dhonbe">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://rtidhonbe.com/og-image.png">
  <link rel="stylesheet" href="/profile.css">
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="logo" style="font-size:14px;margin-bottom:12px">saved profiles</div>
    <button class="btn-back" id="btn-back" style="display:none" title="back">×</button>
  </div>
  <div class="preset-list" id="preset-list"></div>

  <hr class="divider">
  <div class="logo" style="font-size:14px;margin-bottom:16px">add new profile</div>

  <div class="field">
    <div class="field-label-row">
      <label>profile name</label>
      <span class="field-error" id="err-label"></span>
    </div>
    <input type="text" id="f-label" autocomplete="off">
    <div class="hint">short nickname to identify this profile</div>
  </div>
  <div class="field">
    <div class="field-label-row">
      <label>full name</label>
      <span class="field-error" id="err-name"></span>
    </div>
    <input type="text" id="f-name" autocomplete="off">
  </div>
  <div class="field">
    <div class="field-label-row">
      <label>phone</label>
      <span class="field-error" id="err-phone"></span>
    </div>
    <input type="text" id="f-phone" inputmode="numeric" maxlength="7" autocomplete="off">
  </div>
  <div class="field">
    <div class="field-label-row">
      <label>address</label>
      <span class="field-error" id="err-address"></span>
    </div>
    <input type="text" id="f-address" autocomplete="off">
  </div>
  <div class="field">
    <div class="field-label-row">
      <label>display email</label>
      <span class="field-error" id="err-email"></span>
    </div>
    <input type="email" id="f-email" maxlength="80" autocomplete="off">
    <div class="hint" style="color:var(--green)">(optional: this will be the email displayed to the RTI recipient. if you leave this blank, then the mahoali account email will be used)</div>
  </div>

  <button class="btn" id="save-btn" disabled>SAVE AND USE</button>
  <button class="btn btn-ghost" id="skip-btn" style="display:none">CONTINUE WITH SELECTED</button>
  <button class="btn btn-guest" id="guest-btn" style="display:none">ENTER AS GUEST</button>
</div>

<script src="/profile.js"></script>
</body>
</html>
